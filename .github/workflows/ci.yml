name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Test
        run: npm run test
