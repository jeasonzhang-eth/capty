name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # ── Node.js ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Python sidecar ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sidecar
        working-directory: sidecar
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          pip install pyinstaller
          pyinstaller capty-sidecar.spec --clean --noconfirm
          ls -lh dist/capty-sidecar/capty-sidecar

      # ── Electron app ──
      - name: Build & package DMG
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Release ──
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
