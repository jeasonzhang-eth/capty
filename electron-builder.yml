appId: com.capty.app
productName: Capty
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
extraResources:
  - from: sidecar/dist/
    to: sidecar/
    filter:
      - "**/*"
  - from: resources/
    to: resources/
    filter:
      - "**/*"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  target:
    - target: AppImage
      arch:
        - x64
